services:
  # Backend API + Socket.io
  - type: web
    name: mern-chat-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: SERVE_FRONTEND
        value: "false"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        fromService:
          type: web
          name: mern-chat-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend React app (static site)
  - type: web
    name: mern-chat-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: mern-chat-backend
          envVarKey: RENDER_EXTERNAL_URL
